<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>買房 vs. 租房：長期財務決策模擬器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }
        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #e2e8f0;
            outline: none;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #4f46e5;
            cursor: pointer;
            transition: 0.2s;
        }
        .slider-emerald::-webkit-slider-thumb {
            background: #10b981;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-indigo-900 mb-2">買房 vs. 租房：長期財務決策模擬器</h1>
            <p class="text-gray-600">透過 30 年的數據分析，幫助您做出明智的居住與投資選擇</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 控制面板 -->
            <div class="lg:col-span-1 space-y-6">
                <!-- 購屋參數 -->
                <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h2 class="text-lg font-semibold mb-4 text-indigo-700 flex items-center gap-2">
                        🏠 購屋參數
                    </h2>
                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">目標房價 (NT$)</label>
                            <input type="range" id="housePrice" min="3000000" max="50000000" step="500000" value="15000000" class="slider">
                            <div id="housePriceLabel" class="text-right font-mono font-bold text-indigo-600 mt-1">1,500 萬</div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">頭期款 (%)</label>
                                <input type="number" id="downPaymentPct" value="20" class="w-full p-2 border rounded-md">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">貸款年利率 (%)</label>
                                <input type="number" id="interestRate" step="0.1" value="2.1" class="w-full p-2 border rounded-md">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">貸款年限 (年)</label>
                                <input type="number" id="loanTerm" value="30" class="w-full p-2 border rounded-md">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">房價年漲幅 (%)</label>
                                <input type="number" id="propertyAppreciation" step="0.5" value="3" class="w-full p-2 border rounded-md">
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 租屋參數 -->
                <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h2 class="text-lg font-semibold mb-4 text-emerald-700 flex items-center gap-2">
                        🔑 租屋與投資
                    </h2>
                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">目前月租金 (NT$)</label>
                            <input type="range" id="monthlyRent" min="5000" max="150000" step="1000" value="30000" class="slider slider-emerald">
                            <div id="monthlyRentLabel" class="text-right font-mono font-bold text-emerald-600 mt-1">30,000 / 月</div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">租金年漲幅 (%)</label>
                                <input type="number" id="rentIncrease" step="0.5" value="2" class="w-full p-2 border rounded-md">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">投資報酬率 (%)</label>
                                <input type="number" id="investmentReturn" step="0.5" value="5" class="w-full p-2 border rounded-md">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">比較年限 (年)</label>
                            <select id="compareYears" class="w-full p-2 border rounded-md">
                                <option value="10">10 年</option>
                                <option value="20">20 年</option>
                                <option value="30" selected>30 年</option>
                                <option value="40">40 年</option>
                            </select>
                        </div>
                    </div>
                </section>
            </div>

            <!-- 結果展示 -->
            <div class="lg:col-span-2 space-y-6">
                <!-- 快捷摘要 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-indigo-600 text-white p-6 rounded-2xl shadow-lg">
                        <span class="text-indigo-100 text-sm">預估月房貸支出</span>
                        <div id="monthlyMortgageResult" class="text-3xl font-bold mt-1">NT$ 0</div>
                        <div id="loanAmountLabel" class="text-indigo-200 text-xs mt-2">貸款金額: 0</div>
                    </div>
                    <div id="winnerCard" class="p-6 rounded-2xl shadow-lg text-white bg-indigo-900 transition-colors duration-500">
                        <span class="opacity-80 text-sm">長期財富勝出者</span>
                        <div id="winnerText" class="text-3xl font-bold mt-1">計算中...</div>
                        <div id="gapText" class="opacity-80 text-xs mt-2">差距約 0</div>
                    </div>
                </div>

                <!-- 圖表區 -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-lg font-semibold mb-6">淨資產累積趨勢比較</h3>
                    <div class="h-[400px]">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>

                <!-- 數據清單 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-5 rounded-xl border border-gray-100">
                        <h4 class="font-bold text-gray-700 mb-3">📈 買房終點</h4>
                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between text-gray-500">最終房屋估值: <span id="finalHouseValue" class="font-semibold text-indigo-700">-</span></div>
                            <div class="flex justify-between text-gray-500">剩餘房貸: <span id="finalLoanBalance" class="font-semibold text-red-500">-</span></div>
                            <div class="border-t pt-2 mt-2 flex justify-between text-base font-bold text-gray-800">總體淨資產: <span id="buyFinalNet">-</span></div>
                        </div>
                    </div>
                    <div class="bg-white p-5 rounded-xl border border-gray-100">
                        <h4 class="font-bold text-gray-700 mb-3">📊 租房終點</h4>
                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between text-gray-500">累積總租金支出: <span id="totalRentPaid" class="font-semibold text-red-500">-</span></div>
                            <div class="flex justify-between text-gray-500">投資組合價值: <span id="totalInvestment" class="font-semibold text-emerald-600">-</span></div>
                            <div class="border-t pt-2 mt-2 flex justify-between text-base font-bold text-gray-800">總體淨資產: <span id="rentFinalNet">-</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chart;

        function formatCurrency(val) {
            if (val >= 10000000) return (val / 10000000).toFixed(2) + " 千萬";
            if (val >= 10000) return (val / 10000).toFixed(0) + " 萬";
            return val.toLocaleString();
        }

        function calculate() {
            // 讀取輸入
            const housePrice = Number(document.getElementById('housePrice').value);
            const downPaymentPct = Number(document.getElementById('downPaymentPct').value);
            const interestRate = Number(document.getElementById('interestRate').value);
            const loanTerm = Number(document.getElementById('loanTerm').value);
            const appreciation = Number(document.getElementById('propertyAppreciation').value);
            
            const monthlyRent = Number(document.getElementById('monthlyRent').value);
            const rentIncrease = Number(document.getElementById('rentIncrease').value);
            const investmentReturn = Number(document.getElementById('investmentReturn').value);
            const compareYears = Number(document.getElementById('compareYears').value);

            // 更新標籤
            document.getElementById('housePriceLabel').innerText = formatCurrency(housePrice);
            document.getElementById('monthlyRentLabel').innerText = monthlyRent.toLocaleString() + " / 月";

            // 房貸計算
            const downPayment = housePrice * (downPaymentPct / 100);
            const loanAmount = housePrice - downPayment;
            const monthlyRate = interestRate / 100 / 12;
            const totalMonths = loanTerm * 12;
            
            const monthlyMortgage = monthlyRate === 0 
                ? loanAmount / totalMonths 
                : (loanAmount * monthlyRate * Math.pow(1 + monthlyRate, totalMonths)) / (Math.pow(1 + monthlyRate, totalMonths) - 1);

            document.getElementById('monthlyMortgageResult').innerText = "NT$ " + Math.round(monthlyMortgage).toLocaleString();
            document.getElementById('loanAmountLabel').innerText = "貸款金額: " + formatCurrency(loanAmount);

            // 數據生成
            let labels = [];
            let buyData = [];
            let rentData = [];

            let currentHouseValue = housePrice;
            let currentLoanBalance = loanAmount;
            let currentMonthlyRent = monthlyRent;
            let rentNetWorth = downPayment; // 租房者投資頭期款
            let cumulativeRent = 0;

            for (let year = 0; year <= compareYears; year++) {
                labels.push("第 " + year + " 年");
                
                if (year > 0) {
                    // 買房
                    currentHouseValue *= (1 + appreciation / 100);
                    for(let m = 0; m < 12; m++) {
                        if (currentLoanBalance > 0) {
                            let interest = currentLoanBalance * monthlyRate;
                            let principal = Math.min(currentLoanBalance, monthlyMortgage - interest);
                            currentLoanBalance -= principal;
                        }
                    }
                    // 租房
                    currentMonthlyRent *= (1 + rentIncrease / 100);
                    cumulativeRent += (currentMonthlyRent * 12);
                    
                    // 投資差額：(買房支出 - 租房支出)
                    let monthlyDiff = monthlyMortgage - currentMonthlyRent;
                    rentNetWorth *= (1 + investmentReturn / 100);
                    rentNetWorth += (monthlyDiff * 12);
                }

                buyData.push(Math.round(currentHouseValue - currentLoanBalance));
                rentData.push(Math.round(rentNetWorth));
            }

            // 更新圖表
            updateChart(labels, buyData, rentData);

            // 更新終點狀態
            const finalBuyNet = buyData[buyData.length - 1];
            const finalRentNet = rentData[rentData.length - 1];

            document.getElementById('finalHouseValue').innerText = formatCurrency(currentHouseValue);
            document.getElementById('finalLoanBalance').innerText = formatCurrency(currentLoanBalance);
            document.getElementById('buyFinalNet').innerText = formatCurrency(finalBuyNet);
            
            document.getElementById('totalRentPaid').innerText = formatCurrency(cumulativeRent);
            document.getElementById('totalInvestment').innerText = formatCurrency(finalRentNet);
            document.getElementById('rentFinalNet').innerText = formatCurrency(finalRentNet);

            // 更新勝出者
            const winnerCard = document.getElementById('winnerCard');
            const winnerText = document.getElementById('winnerText');
            const gapText = document.getElementById('gapText');

            if (finalBuyNet > finalRentNet) {
                winnerCard.className = "p-6 rounded-2xl shadow-lg text-white bg-indigo-900 transition-colors";
                winnerText.innerText = "買房";
                gapText.innerText = "淨資產領先約 " + formatCurrency(finalBuyNet - finalRentNet);
            } else {
                winnerCard.className = "p-6 rounded-2xl shadow-lg text-white bg-emerald-700 transition-colors";
                winnerText.innerText = "租房 + 投資";
                gapText.innerText = "淨資產領先約 " + formatCurrency(finalRentNet - finalBuyNet);
            }
        }

        function updateChart(labels, buyData, rentData) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            
            if (chart) {
                chart.destroy();
            }

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '買房淨資產',
                            data: buyData,
                            borderColor: '#4f46e5',
                            backgroundColor: 'rgba(79, 70, 229, 0.1)',
                            fill: true,
                            tension: 0.3
                        },
                        {
                            label: '租房投資價值',
                            data: rentData,
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            fill: true,
                            tension: 0.3
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        y: {
                            ticks: { callback: (val) => val / 10000 + ' 萬' },
                            grid: { color: '#f1f5f9' }
                        },
                        x: { grid: { display: false } }
                    },
                    plugins: {
                        legend: { position: 'top' },
                        tooltip: {
                            callbacks: {
                                label: (context) => context.dataset.label + ': NT$ ' + context.raw.toLocaleString()
                            }
                        }
                    }
                }
            });
        }

        // 監聽所有輸入
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('input', calculate);
        });

        // 初始計算
        calculate();
    </script>
</body>
</html>
